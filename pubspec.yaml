name: resume_master
description: "A Flutter application for creating professional resumes."

# Prevent accidental publishing to pub.dev
publish_to: "none"

version: 1.0.0+1

environment:
  sdk: ">=3.7.2 <4.0.0"

dependencies:
  app_settings: ^6.1.1
  cloud_firestore: ^6.0.3
  firebase_auth: ^6.1.1
  firebase_core: ^4.2.0
  firebase_storage: ^13.0.3
  flutter:
    sdk: flutter
  google_sign_in: 6.3.0
  intl: ^0.20.2
  path_provider: ^2.1.5
  pdf: ^3.11.3
  share_plus: ^12.0.1
  image_picker: ^1.2.0
  shared_preferences: ^2.5.3
  flutter_staggered_animations: ^1.1.1
  animated_text_kit: ^4.3.0
  lottie: ^3.3.2
  animated_splash_screen: ^1.3.0
  vibration: ^3.1.4

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0
  flutter_launcher_icons: ^0.14.4

flutter_icons:
  android: "launcher_icon"
  ios: true
  image_path: "assets/images/logo.png"

flutter:
  uses-material-design: true

  assets:
    - assets/images/google.png
    - assets/images/logo.png
    - assets/images/animation.json
    - assets/fonts/CrimsonText-Bold.ttf
    - assets/fonts/CrimsonText-Regular.ttf
    - assets/fonts/CrimsonText-SemiBold.ttf
    - assets/fonts/CrimsonText-Italic.ttf
